version: '3.8'

# Starts the database services required by the wiki server.
# Run: docker compose up -d
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: confluence_clone
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
